<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Resto Faye</title>
  <link rel="stylesheet" href="/assiet/contact.css" />
</head>
<body>
  <div class="contact-container">
    <section class="info-section">
      <img src="../image/AF.png" alt="" width="100px" height="auto">  
      <h1>Nous Contacter</h1>

      <div class="info-item">
        <h3>📍 Adresse</h3>
        <p>45 Avenue Lamine Gueye, 11000 Dakar</p>
      </div>

      <div class="info-item">
        <h3>📞 Téléphone</h3>
        <p>+221 76 616 33 08</p>
      </div>

      <div class="info-item">
        <h3>⏰ Horaires</h3> 
        <p>Lun-Ven : 11h-23h<br>Sam-Dim : 10h-00h</p>
      </div>
    </section>

    <section class="form-section">
      <h2>Réserver ou nous écrire</h2>
      <form action="#" method="post">
        <input type="text" name="nom" placeholder="Votre nom complet" required />
        <input type="email" name="email" placeholder="Votre email" required />

        <div class="form-row">
          <input type="date" name="date" required />
          <input type="number" name="personnes" min="1" max="10" placeholder="Nombre" required />
        </div>

        <textarea name="message" rows="4" placeholder="Votre message ou allergies..."></textarea>
        <button type="submit">ENVOYER LA DEMANDE</button>
      </form>
    </section>

    <section class="map-placeholder">
      <iframe title="Localisation" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d42483.14325742314!2d-17.469802420892766!3d14.722472120247044!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sfr!2ssn!4v1774531257187!5m2!1sfr!2ssn" width="100%" height="100%"

      ></iframe>
    </section>
  </div>
</body>
</html>
