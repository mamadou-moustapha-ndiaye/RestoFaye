<!DOCTYPE html>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

      <form class="d-flex align-items-center gap-2 me-auto">

              <i class="fa-brands fa-sistrix"></i>
            </span>
        <button class="btn btn-success" type="submit">Search</button>
      </form>
    </div>
      <div class="d-flex gap-3">
        <button class="btn btn-outline-secondary rounded-pill"><i class="fa-regular fa-circle-user"></i> Sign in</button>
        <button class="btn btn-light rounded-pill"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</button>
      </div>
  </div>
</nav>
    <!--Page d'Accueil-->
    <div class="container">
      <div class="d-flex pt-5 justify-content-center align-items-center">
          <div class="body-text d-flex flex-column text-center justify-content-center align-items-center">
            <h1>Restaurant</h1>
            <h3 class="text-uppercase">Amadou Faye</h3>

            <p class="txt fs-5 fw-bold "><span>E</span>xplorez, <span>S</span>avourez, <span>R</span>enevez</p>
            <span class="fs-4">
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
            </span>
            <br>
            <button type="button" class="btn text-light text-center rounded-pill">Reservez</button>
       </div>

       <div class="image ms-5">
             <img src="../image/plat.png" alt="">

      </div>

          <img src="../image/Vector 1.png" alt="sgv" class="img2">
          <img src="../image/Ellipse 1.png" alt="svg" class="img1">

    </div>

                        </div>

                        </div>
                     </div>
                </div>
                
                <div class="carousel-item">
                     <div class="d-flex gap-3 px-3">

                </div>

                        </div>
                        <div class="position-relative">
                            <img src="../image/plat.png" class="d-block" alt="">
                            <h2 class="text-center fs-5 mt-2">Fruite</h2>
                        </div>
                        <div class="position-relative">
                            <img src="../image/Yp.jpg" class="d-block" alt="">

              </button>
              <button class="carousel-control-next me-5" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">

                <span class="visually-hidden">Next</span>
               </button>
